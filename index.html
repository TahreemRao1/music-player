<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">
  <div class="music-info">
    <img src="images/cover1.jpg" id="cover" alt="Cover">
    <h2 id="title">Song Title</h2>
    <h3 id="artist">Artist Name</h3>
  </div>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">▶️/⏸️</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <input type="range" id="progress" value="0" onchange="setProgress()">
  <span id="current-time">0:00</span> / <span id="duration">0:00</span>

  <input type="range" id="volume" min="0" max="1" step="0.1" onchange="setVolume()" value="1">

  <div class="playlist">
    <ul id="playlist">
      <!-- Songs will be injected here -->
    </ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
